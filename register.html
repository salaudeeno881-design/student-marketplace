{% extends 'layout.html' %}

{% block content %}
  <section class="form-panel">
    <h2>Create your student account</h2>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <label>Name</label>
      <input type="text" name="name" required />
      <label>Student Email</label>
      <input type="email" name="email" required placeholder="you@student.edu" />
      <label>Department</label>
      <input type="text" name="department" required placeholder="Computer Science" />
      <label>Matric Number</label>
      <input type="text" name="matric_number" required placeholder="CS12345" />
      <label>Password</label>
      <input type="password" name="password" required minlength="8" />
      <button type="submit">Register</button>
    </form>
    <p>Already registered? <a href="{{ url_for('login') }}">Login</a></p>
  </section>
{% endblock %}
